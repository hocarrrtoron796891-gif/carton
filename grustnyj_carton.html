<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Галерея цифровой мультипликации</title>
<style>
body {
    margin: 0;
    padding: 10px;
    font-family: Arial, sans-serif;
    background-color: #121212;
    color: #e0e0e0;
    line-height: 1.4;
}

/* Заглушка загрузки */
#loading {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(18, 18, 18, 0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2em;
    color: #fff;
    z-index: 9999;
}

body.loaded #loading {
    display: none;
}

/* Основные стили для галереи */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    margin-top: 10px;
}

/* Карточки видео */
.video-card {
    background-color: transparent; 
    padding: 10px;
    border-radius: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    backdrop-filter: blur(2px);
}

/* --- Яркие выделенные карточки --- */
.highlighted-card {
    background: linear-gradient(45deg, #ff00cc, #3333ff, #00ffff, #00ff00, #ffff00, #ff0000);
    background-size: 400% 400%;
    animation: flow 10s ease infinite;
    position: relative; 
    z-index: 1;
}

/* Анимация градиента */
@keyframes flow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Стиль для видео-превью */
.video-preview {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    cursor: pointer;
    border-radius: 4px;
    position: relative;
    z-index: 2; 
}

/* Для обычных изображений-превью */
.video-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background-color: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

/* Название видео */
.video-title {
    margin-top: 10px;
    font-size: 1em;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    position: relative;
    z-index: 3;
    color: #ffffff;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
}

/* --- Стиль для особой карточки с выделением --- */
.special-card {
    grid-column: span 2; /* Расширяет на две колонки */
    /* Можно добавить padding или тень, если нужно */
}

.special-card .video-title {
    font-size: 1.5em; /* Сделать заголовок крупнее */
    font-weight: bold;
    text-align: center;
    margin-top: 10px;
}

/* Ограничение по высоте для видео внутри выделенной карточки */
.special-card .video-preview {
    max-height: 300px;
    width: 100%;
}
</style>
</head>
<body>
<div id="loading">Контент грузится для вас</div>

<div class="gallery">
    <!-- Видео "Почему Ёжики Умирают Каждую Неделю?" в начале -->
    <div class="video-card highlighted-card special-card">
        <a href="WHDEW.html" class="video-thumb-link">
            <video src="zhat_videos/цкц.mp4" class="video-preview" muted autoplay loop playsinline></video>
        </a>
        <div class="video-title">Почему Ёжики Умирают Каждую Неделю?</div>
    </div>

    <!-- Остальные видео в обратном порядке -->
    <div class="video-card">
        <a href="SMIR.html" class="video-thumb-link">
            <video src="zhat_videos/Smir.mp4" class="video-preview" muted autoplay loop playsinline></video>
        </a>
        <div class="video-title">Смирение</div>
    </div>
    <div class="video-card">
        <a href="Burs.html" class="video-thumb-link">
            <video src="zhat_videos/Burs.mp4" class="video-preview" muted autoplay loop playsinline></video>
        </a>
        <div class="video-title">Битва в психоделическом лесу</div>
    </div>
    <div class="video-card">
        <a href="MSSF.html" class="video-thumb-link">
            <video src="zhat_videos/MSSF.mp4" class="video-preview" muted autoplay loop playsinline></video>
        </a>
        <div class="video-title">Грибной стул снаружи изнутри</div>
    </div>
    <div class="video-card">
        <a href="AGH.html" class="video-thumb-link">
            <video src="zhat_videos/AGH.mp4" class="video-preview" muted autoplay loop playsinline></video>
        </a>
        <div class="video-title">О великом ёжике</div>
    </div>
    <div class="video-card highlighted-card">
        <a href="ATSM.html" class="video-thumb-link">
            <video src="zhat_videos/ATSM.mp4" class="video-preview" muted autoplay loop playsinline></video>
        </a>
        <div class="video-title">О двух стоящих памятниках</div>
    </div>
</div>

<script>
  // Имитация загрузки
  window.addEventListener('load', () => {
    document.body.classList.add('loaded');
  });

  document.querySelectorAll('.video-thumb').forEach(item => {
    item.addEventListener('click', () => {
      alert('Здесь можно открыть видео или сделать что-то ещё');
    });
  });
</script>

</body>
</html>
