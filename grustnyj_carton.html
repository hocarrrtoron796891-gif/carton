<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Галерея цифровой мультипликации</title>
<style>
body {
    margin: 0;
    padding: 10px;
    font-family: Arial, sans-serif;
    background-color: #121212;
    color: #e0e0e0;
    line-height: 1.4;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    margin-top: 10px;
}

.video-card {
    background-color: #1e1e1e;
    padding: 10px;
    border-radius: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Стиль для видео-превью */
.video-preview {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    cursor: pointer;
    border-radius: 4px;
}

/* Для обычных изображений превью (если есть) */
.video-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background-color: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.video-title {
    margin-top: 10px;
    font-size: 1em;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
</style>
</head>
<body>

<div class="gallery">
    <!-- Первый мультфильм -->
    <div class="video-card">
        <a href="ATSM.html" class="video-thumb-link">
            <video src="zhat_videos/ATSM.mp4" class="video-preview" muted autoplay loop playsinline></video>
        </a>
        <div class="video-title">О двух стоящих памятниках</div>
    </div>

    <!-- Остальные карточки без изменений -->
    <div class="video-card">
        <div class="video-thumb"></div>
        <div class="video-title">О великом ёжике</div>
    </div>
    <div class="video-card">
        <div class="video-thumb"></div>
        <div class="video-title">Грибной стул снаружи изнутри</div>
    </div>
    <div class="video-card">
        <div class="video-thumb"></div>
        <div class="video-title">Битва в психоделическом лесу</div>
    </div>
    <div class="video-card">
        <div class="video-thumb"></div>
        <div class="video-title">Смирение (Short)</div>
    </div>
    <!-- Шестой мультфильм -->
    <div class="video-card">
        <a href="WHDEW.html" class="video-thumb-link">
            <video src="zhat_videos/цкц.mp4" class="video-preview" muted autoplay loop playsinline></video>
        </a>
        <div class="video-title">Почему Ёжики Умирают Каждую Неделю?</div>
    </div>
    <div class="video-card">
        <div class="video-thumb"></div>
        <div class="video-title">по...</div>
    </div>
</div>

<script>
  // Можно оставить, если нужно добавлять обработчики для других элементов
  document.querySelectorAll('.video-thumb').forEach(item => {
    item.addEventListener('click', () => {
      alert('Здесь можно открыть видео или сделать что-то ещё');
    });
  });
</script>

</body>
</html>
